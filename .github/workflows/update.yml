name: Update CDN Rulesets

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Set up Sing-box
      run: |
        TAG=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
        cd /tmp
        curl -LO "https://github.com/SagerNet/sing-box/releases/download/v${TAG}/sing-box-${TAG}-linux-amd64.tar.gz"
        tar -xzf "sing-box-${TAG}-linux-amd64.tar.gz"
        sudo cp "sing-box-${TAG}-linux-amd64/sing-box" /usr/local/bin/

    - name: Run generation script
      env:
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: python generate_ruleset.py

    - name: Commit and push without history
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 抹除历史，重新初始化
        rm -rf .git
        git init
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # 写入临时忽略，防止任何意外的本地配置被上传
        echo "CDN-Routing.yaml" > .gitignore
        
        git add .
        git commit -m "auto: update cdn rulesets ($(date -u +'%Y-%m-%d %H:%M:%S' -d '+8 hours') CST)"
        git remote add origin "https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }}.git"
        git branch -M main
        git push origin main --force

